<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信音频归档 - 播放器</title>
    <style>
        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #252525;
            --bg-card: rgba(255, 255, 255, 0.05);
            --accent: #07C160;
            --accent-hover: #06ad56;
            --text-primary: #ffffff;
            --text-secondary: #a1a1a6;
            --text-tertiary: #636366;
            --border: rgba(255, 255, 255, 0.1);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
        }

        /* 侧边栏 */
        .sidebar {
            width: 360px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-title .icon {
            width: 28px;
            height: 28px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .search-box {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent);
        }

        .search-input::placeholder {
            color: var(--text-tertiary);
        }

        .playlist {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .playlist::-webkit-scrollbar {
            width: 6px;
        }

        .playlist::-webkit-scrollbar-track {
            background: transparent;
        }

        .playlist::-webkit-scrollbar-thumb {
            background: var(--bg-tertiary);
            border-radius: 3px;
        }

        .playlist-item {
            padding: 14px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 4px;
            border: 1px solid transparent;
        }

        .playlist-item:hover {
            background: var(--bg-tertiary);
        }

        .playlist-item.active {
            background: rgba(7, 193, 96, 0.15);
            border-color: var(--accent);
        }

        .playlist-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .playlist-item-sender {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .playlist-item-time {
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .playlist-item-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .playlist-item-date {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .playlist-item-duration {
            font-size: 12px;
            color: var(--text-tertiary);
            background: var(--bg-tertiary);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .playlist-item.playing {
            position: relative;
        }

        .playlist-item.playing::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 60%;
            background: var(--accent);
            border-radius: 0 2px 2px 0;
        }

        /* 主播放区 */
        .player-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
        }

        .album-art {
            width: 280px;
            height: 280px;
            border-radius: 20px;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .album-art-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .album-art-placeholder .icon {
            width: 80px;
            height: 80px;
            background: var(--bg-secondary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .album-art-placeholder .text {
            font-size: 14px;
            color: var(--text-tertiary);
        }

        .vinyl-effect {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.3) 100%);
            pointer-events: none;
        }

        .vinyl-disc {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #222 0deg, #333 30deg, #222 60deg, #333 90deg, #222 120deg, #333 150deg, #222 180deg, #333 210deg, #222 240deg, #333 270deg, #222 300deg, #333 330deg, #222 360deg);
            animation: rotate 3s linear infinite;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .album-art.playing .vinyl-disc {
            opacity: 1;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .track-info {
            text-align: center;
            margin-bottom: 32px;
        }

        .track-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .track-meta {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .track-meta span {
            margin: 0 8px;
        }

        /* 播放控制 */
        .controls {
            width: 100%;
            max-width: 600px;
        }

        .progress-container {
            margin-bottom: 24px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--bg-tertiary);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .progress-bar:hover {
            height: 6px;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s;
        }

        .progress-time {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .control-buttons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
        }

        .control-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            background: var(--bg-tertiary);
        }

        .control-btn svg {
            width: 24px;
            height: 24px;
        }

        .control-btn.prev svg,
        .control-btn.next svg {
            width: 28px;
            height: 28px;
        }

        .control-btn.play-pause {
            width: 56px;
            height: 56px;
            background: var(--accent);
            border-radius: 50%;
        }

        .control-btn.play-pause:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        .control-btn.play-pause svg {
            width: 28px;
            height: 28px;
        }

        .extra-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-top: 24px;
        }

        .speed-btn {
            padding: 6px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .speed-btn:hover,
        .speed-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .volume-slider {
            width: 80px;
            height: 4px;
            -webkit-appearance: none;
            background: var(--bg-tertiary);
            border-radius: 2px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: var(--text-primary);
            border-radius: 50%;
            cursor: pointer;
        }

        /* 键盘提示 */
        .keyboard-hint {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 12px;
            color: var(--text-tertiary);
            background: var(--bg-secondary);
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .keyboard-hint kbd {
            background: var(--bg-tertiary);
            padding: 2px 6px;
            border-radius: 4px;
            margin: 0 2px;
        }

        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-tertiary);
        }

        .empty-state .icon {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .app {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: 50vh;
            }

            .player-main {
                padding: 20px;
            }

            .album-art {
                width: 200px;
                height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- 侧边栏：播放列表 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="sidebar-title">
                    <span class="icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
                            <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                        </svg>
                    </span>
                    <span id="groupName">微信群音频</span>
                </h1>
                <p class="sidebar-subtitle" id="trackCount">共 0 条音频</p>
            </div>
            
            <div class="search-box">
                <input type="text" class="search-input" placeholder="搜索发送者或日期..." id="searchInput">
            </div>
            
            <div class="playlist" id="playlist">
                <!-- 播放列表项将通过 JS 动态生成 -->
            </div>
        </aside>

        <!-- 主播放区 -->
        <main class="player-main">
            <div class="album-art" id="albumArt">
                <div class="album-art-placeholder" id="albumPlaceholder">
                    <div class="icon">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="var(--text-tertiary)">
                            <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                        </svg>
                    </div>
                    <span class="text">选择一首音频开始播放</span>
                </div>
                <div class="vinyl-disc"></div>
                <div class="vinyl-effect"></div>
            </div>

            <div class="track-info" id="trackInfo">
                <h2 class="track-title" id="trackTitle">等待播放</h2>
                <p class="track-meta" id="trackMeta">
                    <span id="trackSender">-</span>
                    <span>|</span>
                    <span id="trackDate">-</span>
                </p>
            </div>

            <div class="controls">
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-time">
                        <span id="currentTime">0:00</span>
                        <span id="totalTime">0:00</span>
                    </div>
                </div>

                <div class="control-buttons">
                    <button class="control-btn prev" id="prevBtn" title="上一首">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                        </svg>
                    </button>
                    <button class="control-btn play-pause" id="playPauseBtn" title="播放/暂停">
                        <svg viewBox="0 0 24 24" fill="currentColor" id="playIcon">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                    </button>
                    <button class="control-btn next" id="nextBtn" title="下一首">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                        </svg>
                    </button>
                </div>

                <div class="extra-controls">
                    <div class="speed-control">
                        <button class="speed-btn" data-speed="0.75">0.75x</button>
                        <button class="speed-btn active" data-speed="1">1x</button>
                        <button class="speed-btn" data-speed="1.25">1.25x</button>
                        <button class="speed-btn" data-speed="1.5">1.5x</button>
                        <button class="speed-btn" data-speed="2">2x</button>
                    </div>
                    <div class="volume-control">
                        <button class="control-btn" id="volumeBtn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                            </svg>
                        </button>
                        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.1" value="1">
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="keyboard-hint">
        <kbd>空格</kbd> 播放 &nbsp;
        <kbd>←</kbd><kbd>→</kbd> 快退快进 &nbsp;
        <kbd>↑</kbd><kbd>↓</kbd> 音量
    </div>

    <script>
        // 播放器状态
        const state = {
            playlist: [],
            currentIndex: -1,
            isPlaying: false,
            playbackRate: 1,
            volume: 1,
            currentTime: 0,
            duration: 0,
            filteredPlaylist: []
        };

        // DOM 元素
        const elements = {
            playlist: document.getElementById('playlist'),
            searchInput: document.getElementById('searchInput'),
            groupName: document.getElementById('groupName'),
            trackCount: document.getElementById('trackCount'),
            albumArt: document.getElementById('albumArt'),
            albumPlaceholder: document.getElementById('albumPlaceholder'),
            trackTitle: document.getElementById('trackTitle'),
            trackSender: document.getElementById('trackSender'),
            trackDate: document.getElementById('trackDate'),
            progressBar: document.getElementById('progressBar'),
            progressFill: document.getElementById('progressFill'),
            currentTime: document.getElementById('currentTime'),
            totalTime: document.getElementById('totalTime'),
            playPauseBtn: document.getElementById('playPauseBtn'),
            playIcon: document.getElementById('playIcon'),
            prevBtn: document.getElementById('prevBtn'),
            nextBtn: document.getElementById('nextBtn'),
            volumeSlider: document.getElementById('volumeSlider'),
            speedBtns: document.querySelectorAll('.speed-btn')
        };

        // 音频对象
        const audio = new Audio();
        audio.volume = state.volume;

        // 初始化
        async function init() {
            await loadPlaylist();
            renderPlaylist();
            bindEvents();
        }

        // 加载播放列表
        async function loadPlaylist() {
            try {
                const response = await fetch('./data/playlist.json');
                const data = await response.json();
                state.playlist = data.playlist || [];
                state.filteredPlaylist = [...state.playlist];
                
                // 更新页面标题
                elements.groupName.textContent = data.group_name || '微信群音频';
                elements.trackCount.textContent = `共 ${state.playlist.length} 条音频`;
            } catch (error) {
                console.error('加载播放列表失败:', error);
                // 使用示例数据
                state.playlist = getSampleData();
                state.filteredPlaylist = [...state.playlist];
            }
        }

        // 示例数据（当没有真实数据时使用）
        function getSampleData() {
            return [
                {
                    id: 'audio_001',
                    filename: 'sample_001.mp3',
                    url: './audio/sample_001.mp3',
                    sender: '张三',
                    timestamp: 1707123456,
                    date_display: '2024-02-05 10:30:56',
                    duration: 45
                },
                {
                    id: 'audio_002',
                    filename: 'sample_002.mp3',
                    url: './audio/sample_002.mp3',
                    sender: '李四',
                    timestamp: 1707126789,
                    date_display: '2024-02-05 11:13:09',
                    duration: 32
                },
                {
                    id: 'audio_003',
                    filename: 'sample_003.mp3',
                    url: './audio/sample_003.mp3',
                    sender: '王五',
                    timestamp: 1707130123,
                    date_display: '2024-02-05 14:22:03',
                    duration: 58
                }
            ];
        }

        // 渲染播放列表
        function renderPlaylist() {
            const html = state.filteredPlaylist.map((item, index) => {
                const originalIndex = state.playlist.indexOf(item);
                const isActive = originalIndex === state.currentIndex;
                const isPlaying = isActive && state.isPlaying;
                
                return `
                    <div class="playlist-item ${isActive ? 'active' : ''} ${isPlaying ? 'playing' : ''}" 
                         data-index="${originalIndex}">
                        <div class="playlist-item-header">
                            <span class="playlist-item-sender">${item.sender}</span>
                            <span class="playlist-item-time">${formatTime(item.duration)}</span>
                        </div>
                        <div class="playlist-item-meta">
                            <span class="playlist-item-date">${item.date_display}</span>
                            ${isPlaying ? '<span class="playing-indicator">🎵</span>' : ''}
                        </div>
                    </div>
                `;
            }).join('');

            elements.playlist.innerHTML = html || '<div class="empty-state">没有找到音频文件</div>';
            
            // 绑定点击事件
            document.querySelectorAll('.playlist-item').forEach(item => {
                item.addEventListener('click', () => {
                    const index = parseInt(item.dataset.index);
                    playTrack(index);
                });
            });
        }

        // 播放指定曲目
        function playTrack(index) {
            if (index < 0 || index >= state.playlist.length) return;
            
            state.currentIndex = index;
            const track = state.playlist[index];
            
            // 更新音频源
            audio.src = track.url;
            audio.playbackRate = state.playbackRate;
            
            // 更新界面
            updateTrackInfo(track);
            elements.albumArt.classList.add('playing');
            elements.albumPlaceholder.style.display = 'none';
            
            // 开始播放
            audio.play().then(() => {
                state.isPlaying = true;
                updatePlayPauseButton();
                renderPlaylist();
            }).catch(err => {
                console.error('播放失败:', err);
            });
            
            // 保存播放位置
            localStorage.setItem('lastPlayedIndex', index);
        }

        // 更新曲目信息
        function updateTrackInfo(track) {
            elements.trackTitle.textContent = track.sender || '未知发送者';
            elements.trackSender.textContent = track.sender || '未知发送者';
            elements.trackDate.textContent = track.date_display || '-';
        }

        // 更新播放/暂停按钮
        function updatePlayPauseButton() {
            if (state.isPlaying) {
                elements.playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
            } else {
                elements.playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
            }
        }

        // 播放/暂停切换
        function togglePlayPause() {
            if (state.currentIndex === -1 && state.playlist.length > 0) {
                playTrack(0);
                return;
            }
            
            if (state.isPlaying) {
                audio.pause();
            } else {
                audio.play();
            }
            state.isPlaying = !state.isPlaying;
            updatePlayPauseButton();
            renderPlaylist();
        }

        // 播放上一首
        function playPrev() {
            if (state.currentIndex > 0) {
                playTrack(state.currentIndex - 1);
            }
        }

        // 播放下一首
        function playNext() {
            if (state.currentIndex < state.playlist.length - 1) {
                playTrack(state.currentIndex + 1);
            } else {
                // 循环播放
                playTrack(0);
            }
        }

        // 格式化时间
        function formatTime(seconds) {
            if (!seconds) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // 更新进度条
        function updateProgress() {
            if (audio.duration) {
                const percent = (audio.currentTime / audio.duration) * 100;
                elements.progressFill.style.width = `${percent}%`;
                elements.currentTime.textContent = formatTime(audio.currentTime);
                elements.totalTime.textContent = formatTime(audio.duration);
            }
        }

        // 搜索过滤
        function filterPlaylist(query) {
            if (!query) {
                state.filteredPlaylist = [...state.playlist];
            } else {
                const lowerQuery = query.toLowerCase();
                state.filteredPlaylist = state.playlist.filter(item => {
                    return (item.sender && item.sender.toLowerCase().includes(lowerQuery)) ||
                           (item.date_display && item.date_display.includes(lowerQuery));
                });
            }
            renderPlaylist();
        }

        // 绑定事件
        function bindEvents() {
            // 播放/暂停
            elements.playPauseBtn.addEventListener('click', togglePlayPause);
            
            // 上一首/下一首
            elements.prevBtn.addEventListener('click', playPrev);
            elements.nextBtn.addEventListener('click', playNext);
            
            // 进度条点击
            elements.progressBar.addEventListener('click', (e) => {
                const rect = elements.progressBar.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                audio.currentTime = percent * audio.duration;
            });
            
            // 音量控制
            elements.volumeSlider.addEventListener('input', (e) => {
                audio.volume = e.target.value;
                state.volume = e.target.value;
            });
            
            // 速度控制
            elements.speedBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const speed = parseFloat(btn.dataset.speed);
                    audio.playbackRate = speed;
                    state.playbackRate = speed;
                    
                    elements.speedBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
            });
            
            // 搜索
            elements.searchInput.addEventListener('input', (e) => {
                filterPlaylist(e.target.value);
            });
            
            // 音频事件
            audio.addEventListener('timeupdate', updateProgress);
            audio.addEventListener('ended', () => {
                // 自动播放下一首
                playNext();
            });
            audio.addEventListener('loadedmetadata', () => {
                elements.totalTime.textContent = formatTime(audio.duration);
            });
            audio.addEventListener('error', (e) => {
                console.error('音频加载失败:', e);
                alert('音频文件加载失败，请检查文件是否存在');
            });
            
            // 键盘快捷键
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT') return;
                
                switch(e.code) {
                    case 'Space':
                        e.preventDefault();
                        togglePlayPause();
                        break;
                    case 'ArrowLeft':
                        audio.currentTime = Math.max(0, audio.currentTime - 10);
                        break;
                    case 'ArrowRight':
                        audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
                        break;
                    case 'ArrowUp':
                        audio.volume = Math.min(1, audio.volume + 0.1);
                        elements.volumeSlider.value = audio.volume;
                        break;
                    case 'ArrowDown':
                        audio.volume = Math.max(0, audio.volume - 0.1);
                        elements.volumeSlider.value = audio.volume;
                        break;
                }
            });
            
            // 恢复上次播放位置
            const lastIndex = localStorage.getItem('lastPlayedIndex');
            if (lastIndex !== null && state.playlist.length > 0) {
                // 可选：自动恢复播放位置
                // playTrack(parseInt(lastIndex));
            }
        }

        // 启动
        init();
    </script>
</body>
</html>
