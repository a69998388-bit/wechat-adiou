<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music Pro - Ultra Glass v9</title>
    <style>
        :root {
            --ios-blue: #007aff;
            --ios-red: #ff453a;
            --text-main: #ffffff;
            --text-sec: rgba(255, 255, 255, 0.85);
            --glass-bg: rgba(20, 20, 20, 0.75);
            --glass-border: rgba(255, 255, 255, 0.18);
            --outer-radius: 38px;
            --inner-radius: 26px;
        }

        /* 基础重置 - 彻底消除边框和焦点框 */
        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            outline: none !important;
            border: none !important;
        }

        @keyframes aurora {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: linear-gradient(-45deg, #0f172a, #1e3a8a, #581c87, #000);
            background-size: 400% 400%;
            animation: aurora 15s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-main);
        }

        .master-container {
            width: 98%; max-width: 1200px; height: 92vh;
            display: flex; gap: 15px; padding: 15px;
            background: var(--glass-bg);
            backdrop-filter: blur(50px) saturate(200%);
            -webkit-backdrop-filter: blur(50px) saturate(200%);
            border-radius: var(--outer-radius);
            border: 1px solid var(--glass-border) !important;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1), 0 50px 100px rgba(0,0,0,0.6);
        }

        .player-hero {
            flex: 2; background: rgba(255, 255, 255, 0.04);
            border-radius: var(--inner-radius);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 40px; position: relative; transition: 0.3s;
        }
        .player-hero.drag-over { background: rgba(0, 122, 255, 0.15); border: 2px dashed var(--ios-blue) !important; }

        .cover-art {
            width: clamp(280px, 40vh, 400px); height: clamp(280px, 40vh, 400px);
            background: linear-gradient(135deg, #444, #000); border-radius: 44px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.5); margin-bottom: 40px;
            display: flex; align-items: center; justify-content: center; font-size: 130px;
        }

        .song-meta { text-align: center; margin-bottom: 35px; }
        .song-meta h1 { font-size: 40px; margin: 0 0 10px; font-weight: 700; text-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .song-meta p { font-size: 22px; color: var(--text-sec); margin: 0; }

        .playback-bar { width: 100%; max-width: 550px; margin-bottom: 35px; }
        #progressBar { width: 100%; height: 7px; background: rgba(255,255,255,0.15); border-radius: 10px; cursor: pointer; position: relative; }
        #progressFill { height: 100%; background: #fff; width: 0%; box-shadow: 0 0 20px #fff; }

        /* 播放控制按钮 - 72px 纯白图标 */
        .main-controls { display: flex; align-items: center; gap: 50px; }
        .icon-btn {
            background: transparent !important;
            color: #ffffff !important;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease, opacity 0.2s ease;
            -webkit-tap-highlight-color: transparent;
            padding: 0; margin: 0;
            user-select: none;
        }
        .play-trigger { font-size: 72px; width: 80px; height: 80px; }
        .nav-btn { font-size: 44px; opacity: 0.7; }
        .icon-btn:hover { transform: scale(1.1); opacity: 0.9; }

        /* 侧边栏列表 */
        .sidebar { flex: 1.1; display: flex; flex-direction: column; overflow: hidden; }
        .list-scroll { flex: 1; overflow-y: auto; padding: 10px; }
        .group-container { margin-bottom: 20px; padding: 5px; border-radius: 18px; transition: 0.3s; }
        .group-container.drag-target { background: rgba(0, 122, 255, 0.1); border: 1px solid var(--ios-blue) !important; }
        .group-header { font-size: 13px; font-weight: 800; color: var(--text-sec); padding: 12px; opacity: 0.6; }

        .audio-card {
            display: flex; align-items: center; padding: 14px; border-radius: 16px;
            cursor: grab; transition: 0.2s; margin-bottom: 6px; background: rgba(255,255,255,0.04);
        }
        .audio-card:hover { background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .audio-card.active { background: var(--ios-blue); box-shadow: 0 10px 25px rgba(0, 122, 255, 0.3); }
        .card-info { flex: 1; margin-left: 15px; overflow: hidden; }
        .card-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        #contextMenu {
            position: fixed; z-index: 2000; background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(25px); border-radius: 14px; padding: 6px;
            min-width: 180px; display: none; border: 1px solid rgba(255,255,255,0.15) !important;
        }
        .menu-item { padding: 12px 16px; font-size: 14px; border-radius: 10px; cursor: pointer; color: white; }
        .menu-item:hover { background: var(--ios-blue); }
        ::-webkit-scrollbar { width: 0px; }

        /* 手机端响应式适配 */
        @media (max-width: 768px) {
            .master-container {
                flex-direction: column;
                height: 100vh;
                width: 100%;
                border-radius: 0;
                padding: 10px;
                gap: 10px;
            }

            .player-hero {
                flex: none;
                height: 60vh;
                padding: 20px;
                justify-content: space-around;
            }

            .cover-art {
                width: 60vw;
                height: 60vw;
                max-width: 300px;
                max-height: 300px;
                margin-bottom: 20px;
                font-size: 80px;
            }

            .song-meta h1 {
                font-size: 24px;
            }

            .song-meta p {
                font-size: 16px;
            }

            .main-controls {
                gap: 30px;
            }

            .play-trigger {
                font-size: 56px;
                width: 60px;
                height: 60px;
            }

            .nav-btn {
                font-size: 32px;
            }

            .sidebar {
                flex: 1;
            }

            .audio-card {
                padding: 10px;
            }
        }
    </style>
</head>
<body>

<div class="master-container" id="dropZone">
    <div class="player-hero" id="playerHero">
        <div class="cover-art" id="mainCover">🎵</div>
        <div class="song-meta">
            <h1 id="titleDisplay">音乐库</h1>
            <p id="artistDisplay">等待扫描本地文件...</p>
        </div>

        <div class="playback-bar">
            <div id="progressBar"><div id="progressFill"></div></div>
            <div style="display: flex; justify-content: space-between; font-size: 14px; margin-top: 12px; font-weight: 600;">
                <span id="curTime">0:00</span>
                <span id="totalTime">0:00</span>
            </div>
        </div>

        <div class="main-controls">
            <button class="icon-btn nav-btn" id="prevBtn">⏮</button>
            <button class="icon-btn play-trigger" id="playBtn">▶️</button>
            <button class="icon-btn nav-btn" id="nextBtn">⏭</button>
        </div>
    </div>

    <div class="sidebar" id="sidebarArea">
        <div style="padding: 15px; font-size: 24px; font-weight: 800; letter-spacing: -1px;">资料库</div>
        <div class="list-scroll" id="libContent"></div>
    </div>
</div>

<div id="contextMenu"></div>
<audio id="audioEngine"></audio>

<script>
    let state = JSON.parse(localStorage.getItem('apple_player_v9')) || {
        groups: [{ id: 'g_local', name: '本地导入', tracks: [] }],
        currentTrackId: null,
        isPlaying: false
    };

    const audio = document.getElementById('audioEngine');
    const ctxMenu = document.getElementById('contextMenu');
    let draggedTrackId = null;

    // --- 核心修复：自动生成适配本地/云端的音频URL ---
    function getAudioUrl(filename) {
        // 获取当前页面的根路径（自动适配本地/云端）
        const baseUrl = window.location.origin + window.location.pathname.replace(/\/[^\/]*$/, '/');
        // 拼接音频文件的完整路径
        return baseUrl + 'audio/' + filename;
    }

    // --- 初始化与文件扫描 ---
    async function init() {
        // 如果当前没有分组或者只有空的本地导入，尝试加载 JSON
        if (state.groups.length <= 1 && state.groups[0].tracks.length === 0) {
            try {
                const response = await fetch('./data/playlist.json');
                const data = await response.json();
                if (data.playlist || data.播放列表) {
                    // 兼容两种 playlist.json 格式（playlist 或 播放列表）
                    const trackList = data.playlist || data.播放列表;
                    state.groups.push({
                        id: 'g_remote',
                        name: '预设清单',
                        tracks: trackList.map(t => ({
                            ...t,
                            id: 't_' + Math.random().toString(36).substr(2, 9),
                            name: t.filename || t.文件名,
                            // 使用自动生成的URL替换原来的本地URL
                            url: getAudioUrl(t.filename || t.文件名)
                        }))
                    });
                    document.getElementById('artistDisplay').innerText = "已加载预设清单";
                }
            } catch (e) {
                document.getElementById('artistDisplay').innerText = "未发现 playlist.json，请手动拖入音频";
            }
        } else {
            document.getElementById('artistDisplay').innerText = "就绪";
        }
        render();
        setupEvents();
    }

    function render() {
        const container = document.getElementById('libContent');
        container.innerHTML = '';
        state.groups.forEach(group => {
            const gDiv = document.createElement('div');
            gDiv.className = 'group-container';
            gDiv.innerHTML = `<div class="group-header">${group.name} (${group.tracks.length})</div>`;
            
            gDiv.ondragover = (e) => { e.preventDefault(); gDiv.classList.add('drag-target'); };
            gDiv.ondragleave = () => gDiv.classList.remove('drag-target');
            gDiv.ondrop = (e) => {
                e.preventDefault();
                gDiv.classList.remove('drag-target');
                if (draggedTrackId) moveTrack(draggedTrackId, group.id);
            };

            group.tracks.forEach(t => {
                const card = document.createElement('div');
                card.className = `audio-card ${state.currentTrackId === t.id ? 'active' : ''}`;
                card.draggable = true;
                card.innerHTML = `
                    <div style="font-size: 18px;">${state.currentTrackId === t.id && state.isPlaying ? '🔊' : '🎵'}</div>
                    <div class="card-info"><div class="card-title">${t.name}</div></div>
                `;
                card.onclick = () => playTrack(t);
                card.ondragstart = () => { draggedTrackId = t.id; };
                card.oncontextmenu = (e) => {
                    e.preventDefault();
                    showMenu(e, 'track', { gId: group.id, tId: t.id });
                };
                gDiv.appendChild(card);
            });
            container.appendChild(gDiv);
        });
        localStorage.setItem('apple_player_v9', JSON.stringify(state));
    }

    function playTrack(track) {
        if (state.currentTrackId === track.id) { togglePlay(); return; }
        state.currentTrackId = track.id;
        audio.src = track.url;
        audio.play().then(() => {
            state.isPlaying = true;
            updateUI(track);
            render();
        }).catch(err => {
            console.error("无法播放，可能是路径错误或文件丢失", err);
            alert(`无法读取音频文件：${track.name}\n请检查文件是否已上传到 GitHub 的 audio 文件夹`);
        });
    }

    function togglePlay() {
        if (!audio.src) return;
        if (audio.paused) { audio.play(); state.isPlaying = true; }
        else { audio.pause(); state.isPlaying = false; }
        updateUI();
    }

    function updateUI(track) {
        const btn = document.getElementById('playBtn');
        if (track) document.getElementById('titleDisplay').innerText = track.name;
        btn.innerText = state.isPlaying ? '⏸' : '▶️';
    }

    function moveTrack(tId, gId) {
        let trackObj = null;
        state.groups.forEach(g => {
            const idx = g.tracks.findIndex(t => t.id === tId);
            if (idx > -1) trackObj = g.tracks.splice(idx, 1)[0];
        });
        if (trackObj) {
            state.groups.find(g => g.id === gId).tracks.push(trackObj);
            render();
        }
    }

    function deleteTrack(gId, tId) {
        const g = state.groups.find(g => g.id === gId);
        g.tracks = g.tracks.filter(t => t.id !== tId);
        if (state.currentTrackId === tId) { audio.pause(); state.isPlaying = false; updateUI(); }
        render();
    }

    function createNewGroup() {
        const name = prompt("新建组名称", "我的歌单");
        if (name) { state.groups.push({ id: 'g_'+Date.now(), name: name, tracks: [] }); render(); }
    }

    function showMenu(e, type, data) {
        ctxMenu.style.display = 'block';
        ctxMenu.style.left = e.clientX + 'px';
        ctxMenu.style.top = e.clientY + 'px';
        if (type === 'track') {
            ctxMenu.innerHTML = `<div class="menu-item" style="color:var(--ios-red)" onclick="deleteTrack('${data.gId}','${data.tId}')">移除歌曲</div>`;
        } else {
            ctxMenu.innerHTML = `<div class="menu-item" onclick="createNewGroup()">新建分组</div>`;
        }
    }

    function setupEvents() {
        const hero = document.getElementById('playerHero');
        hero.ondragover = (e) => { e.preventDefault(); hero.classList.add('drag-over'); };
        hero.ondragleave = () => hero.classList.remove('drag-over');
        hero.ondrop = (e) => {
            e.preventDefault();
            hero.classList.remove('drag-over');
            const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('audio/'));
            files.forEach(file => {
                state.groups[0].tracks.push({
                    id: 't_' + Date.now() + Math.random(),
                    name: file.name.replace(/\.[^/.]+$/, ""),
                    url: URL.createObjectURL(file)
                });
            });
            render();
        };

        document.getElementById('playBtn').onclick = togglePlay;
        window.onclick = () => ctxMenu.style.display = 'none';
        document.getElementById('sidebarArea').oncontextmenu = (e) => {
            e.preventDefault();
            showMenu(e, 'sidebar');
        };

        audio.ontimeupdate = () => {
            if (audio.duration) {
                const per = (audio.currentTime / audio.duration) * 100;
                document.getElementById('progressFill').style.width = per + '%';
                document.getElementById('curTime').innerText = formatTime(audio.currentTime);
                document.getElementById('totalTime').innerText = formatTime(audio.duration);
            }
        };

        document.getElementById('progressBar').onclick = (e) => {
            const rect = e.target.getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
        };

        // 上一首/下一首功能
        document.getElementById('prevBtn').onclick = () => {
            const currentGroup = state.groups.find(g => g.tracks.some(t => t.id === state.currentTrackId));
            if (!currentGroup) return;
            const currentIdx = currentGroup.tracks.findIndex(t => t.id === state.currentTrackId);
            if (currentIdx > 0) {
                playTrack(currentGroup.tracks[currentIdx - 1]);
            }
        };

        document.getElementById('nextBtn').onclick = () => {
            const currentGroup = state.groups.find(g => g.tracks.some(t => t.id === state.currentTrackId));
            if (!currentGroup) return;
            const currentIdx = currentGroup.tracks.findIndex(t => t.id === state.currentTrackId);
            if (currentIdx < currentGroup.tracks.length - 1) {
                playTrack(currentGroup.tracks[currentIdx + 1]);
            } else {
                // 循环播放
                playTrack(currentGroup.tracks[0]);
            }
        };
    }

    function formatTime(s) {
        const m = Math.floor(s/60), sec = Math.floor(s%60);
        return `${m}:${sec.toString().padStart(2, '0')}`;
    }

    init();
</script>
</body>
</html>
